---
{{- $ipp := .Values.upstreamIpp.payloadProcessor }}
{{- if $ipp.multiNamespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-externalmodels-reader
rules:
  # apikey-injection plugin: watches labeled Secrets
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
  # model-provider-resolver plugin: watches ExternalModel and ExternalProvider CRDs
  - apiGroups: ["maas.opendatahub.io"]
    resources: ["externalmodels"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["inference.opendatahub.io"]
    resources: ["externalproviders", "externalmodels"]
    verbs: ["get", "list", "watch", "create", "update"]
  - apiGroups: ["inference.opendatahub.io"]
    resources: ["externalproviders/status", "externalmodels/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["inference.opendatahub.io"]
    resources: ["externalproviders/finalizers", "externalmodels/finalizers"]
    verbs: ["update"]
  # controller reconcilers: create networking resources
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["httproutes"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
  - apiGroups: ["networking.istio.io"]
    resources: ["serviceentries", "destinationrules"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-externalmodels-reader
subjects:
- kind: ServiceAccount
  name: {{ $ipp.name }}-{{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Name }}-externalmodels-reader
{{- else }} ## if bbr is set in a single namespace
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-externalmodels-reader
  namespace: {{ .Release.Namespace }}
rules:
  # apikey-injection plugin: watches labeled Secrets
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
  # model-provider-resolver plugin: watches ExternalModel and ExternalProvider CRDs
  - apiGroups: ["maas.opendatahub.io"]
    resources: ["externalmodels"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["inference.opendatahub.io"]
    resources: ["externalproviders", "externalmodels"]
    verbs: ["get", "list", "watch", "create", "update"]
  - apiGroups: ["inference.opendatahub.io"]
    resources: ["externalproviders/status", "externalmodels/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["inference.opendatahub.io"]
    resources: ["externalproviders/finalizers", "externalmodels/finalizers"]
    verbs: ["update"]
  # controller reconcilers: create networking resources
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["httproutes"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
  - apiGroups: ["networking.istio.io"]
    resources: ["serviceentries", "destinationrules"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-externalmodels-reader
  namespace: {{ .Release.Namespace }}
subjects:
- kind: ServiceAccount
  name: {{ $ipp.name }}-{{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Release.Name }}-externalmodels-reader
{{- end }}
